spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/products_db
    username: products_user
    password: products_pass
  jpa:
    hibernate:
      ddl-auto: update

server:
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

# Configuração de timezone: todos os timestamps são UTC
# O cliente é responsável pela conversão de timezone
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} UTC %msg%n"